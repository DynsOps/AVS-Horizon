name: Deploy Azure Function API

on:
  push:
    branches:
      - main
    paths:
      - "function-api/**"
      - ".github/workflows/azure-function-api-deploy.yml"
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        working-directory: function-api
        run: npm ci

      - name: Build
        working-directory: function-api
        run: npm run build

      - name: Validate deployment credentials
        env:
          AZURE_FUNCTIONAPP_PUBLISH_PROFILE: ${{ secrets.AZURE_FUNCTIONAPP_PUBLISH_PROFILE }}
        run: |
          if [ -z "$AZURE_FUNCTIONAPP_PUBLISH_PROFILE" ]; then
            echo "Missing secret: AZURE_FUNCTIONAPP_PUBLISH_PROFILE"
            exit 1
          fi

      - name: Deploy Function App
        uses: Azure/functions-action@v1
        with:
          app-name: avs-horizon-global-func-auth
          package: function-api
          publish-profile: ${{ secrets.AZURE_FUNCTIONAPP_PUBLISH_PROFILE }}
