name: Deploy Azure Function API

on:
  push:
    branches:
      - main
    paths:
      - "function-api/**"
      - ".github/workflows/azure-function-api-deploy.yml"
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        working-directory: function-api
        run: npm ci

      - name: Build
        working-directory: function-api
        run: npm run build

      - name: Validate deployment credentials
        env:
          AZURE_FUNCTIONAPP_PUBLISH_PROFILE: ${{ secrets.AZURE_FUNCTIONAPP_PUBLISH_PROFILE || vars.AZURE_FUNCTIONAPP_PUBLISH_PROFILE }}
        run: |
          if [ -z "$AZURE_FUNCTIONAPP_PUBLISH_PROFILE" ]; then
            echo "Missing deployment credential: AZURE_FUNCTIONAPP_PUBLISH_PROFILE (secret or variable)"
            exit 1
          fi

      - name: Deploy Function App
        uses: Azure/functions-action@v1
        with:
          app-name: avs-horizon-global-func-auth
          package: function-api
          publish-profile: ${{ secrets.AZURE_FUNCTIONAPP_PUBLISH_PROFILE || vars.AZURE_FUNCTIONAPP_PUBLISH_PROFILE }}
          respect-funcignore: true

      - name: Sync triggers and verify discovered functions
        env:
          AZURE_FUNCTIONAPP_PUBLISH_PROFILE: ${{ secrets.AZURE_FUNCTIONAPP_PUBLISH_PROFILE || vars.AZURE_FUNCTIONAPP_PUBLISH_PROFILE }}
        run: |
          python - <<'PY'
          import base64
          import json
          import os
          import sys
          import urllib.request
          import xml.etree.ElementTree as ET
          from urllib.error import HTTPError, URLError

          profile_xml = (os.environ.get("AZURE_FUNCTIONAPP_PUBLISH_PROFILE") or "").strip()
          if not profile_xml:
              print("Publish profile is empty.")
              sys.exit(1)

          try:
              root = ET.fromstring(profile_xml)
          except ET.ParseError as exc:
              print(f"Failed to parse publish profile XML: {exc}")
              sys.exit(1)

          profile = None
          for candidate in root.findall(".//publishProfile"):
              method = (candidate.attrib.get("publishMethod") or "").lower()
              publish_url = (candidate.attrib.get("publishUrl") or "").lower()
              if method in {"zipdeploy", "msdeploy"} and ".scm." in publish_url:
                  profile = candidate
                  break
          if profile is None:
              profile = root.find(".//publishProfile")

          if profile is None:
              print("No publishProfile entry found in publish profile XML.")
              sys.exit(1)

          user = profile.attrib.get("userName", "")
          password = profile.attrib.get("userPWD", "")
          publish_url = profile.attrib.get("publishUrl", "")
          scm_host = publish_url.split(":")[0]
          if not user or not password or not scm_host:
              print("Publish profile is missing userName/userPWD/publishUrl.")
              sys.exit(1)

          token = base64.b64encode(f"{user}:{password}".encode("utf-8")).decode("ascii")
          headers = {
              "Authorization": f"Basic {token}",
              "Content-Type": "application/json",
              "Accept": "application/json",
          }

          def call(method: str, url: str):
              req = urllib.request.Request(url=url, method=method, headers=headers)
              with urllib.request.urlopen(req, timeout=30) as resp:
                  body = resp.read().decode("utf-8", errors="replace")
                  return resp.status, body

          def call_soft(method: str, url: str):
              try:
                  return call(method, url)
              except HTTPError as exc:
                  body = exc.read().decode("utf-8", errors="replace") if hasattr(exc, "read") else ""
                  return exc.code, body
              except URLError as exc:
                  return None, str(exc)

          sync_url = f"https://{scm_host}/api/functions/synctriggers"
          status, sync_body = call_soft("POST", sync_url)
          if status in (200, 202, 204):
              print(f"synctriggers status: {status}")
          else:
              print(f"synctriggers skipped/unavailable (status={status}).")
              if sync_body:
                  print(sync_body[:500])

          list_url = f"https://{scm_host}/api/functions"
          status, body = call_soft("GET", list_url)
          if status == 200:
              payload = json.loads(body) if body else []
              names = []
              if isinstance(payload, list):
                  for item in payload:
                      if isinstance(item, dict):
                          name = item.get("name")
                          if isinstance(name, str) and name:
                              names.append(name)
              print(f"discovered function count: {len(names)}")
              print("discovered functions:")
              for name in sorted(names):
                  print(f"- {name}")
          else:
              print(f"/api/functions not available (status={status}). Falling back to deployed file listing.")
              vfs_url = f"https://{scm_host}/api/vfs/site/wwwroot/dist/src/functions/"
              vfs_status, vfs_body = call_soft("GET", vfs_url)
              if vfs_status != 200:
                  print(f"fallback file listing failed (status={vfs_status}).")
                  if vfs_body:
                      print(vfs_body[:500])
                  sys.exit(1)
              payload = json.loads(vfs_body) if vfs_body else []
              js_files = []
              if isinstance(payload, list):
                  for item in payload:
                      if isinstance(item, dict):
                          name = item.get("name")
                          if isinstance(name, str) and name.endswith(".js"):
                              js_files.append(name)
              print(f"deployed function js file count: {len(js_files)}")
              print("deployed function js files:")
              for name in sorted(js_files):
                  print(f"- {name}")
              if len(js_files) == 0:
                  print("No deployed function js files found in dist/src/functions.")
                  sys.exit(1)
          PY
