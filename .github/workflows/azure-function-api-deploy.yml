name: Deploy Azure Function API

on:
  push:
    branches:
      - main
    paths:
      - "function-api/**"
      - ".github/workflows/azure-function-api-deploy.yml"
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        working-directory: function-api
        run: npm ci

      - name: Build
        working-directory: function-api
        run: npm run build

      - name: Validate deployment credentials
        run: |
          if [ -z "${{ secrets.AZURE_FUNCTIONAPP_PUBLISH_PROFILE }}" ] && [ -z "${{ secrets.AZURE_CREDENTIALS }}" ]; then
            echo "Missing secrets: set AZURE_FUNCTIONAPP_PUBLISH_PROFILE or AZURE_CREDENTIALS"
            exit 1
          fi

      - name: Azure Login (RBAC)
        if: ${{ secrets.AZURE_CREDENTIALS != '' }}
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy Function App
        uses: Azure/functions-action@v1
        with:
          app-name: avs-horizon-global-func-auth
          package: function-api
          publish-profile: ${{ secrets.AZURE_FUNCTIONAPP_PUBLISH_PROFILE }}
