<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AVS Global Horizon Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            fontFamily: {
              sans: ['Manrope', 'system-ui', 'sans-serif'],
              display: ['Sora', 'Manrope', 'system-ui', 'sans-serif'],
              mono: ['JetBrains Mono', 'ui-monospace', 'SFMono-Regular', 'monospace'],
            },
            colors: {
              slate: {
                850: '#151e2e', // Custom depth between 800 and 900
                900: '#0f172a', // Surface L2
                950: '#020617', // Surface L1 (Background)
              }
            },
            boxShadow: {
              'glow': '0 0 20px -5px rgba(59, 130, 246, 0.5)',
              'glass': '0 8px 32px 0 rgba(31, 38, 135, 0.37)',
              'panel': '0 12px 45px -20px rgba(15, 23, 42, 0.35)',
            }
          }
        }
      }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Manrope:wght@400;500;600;700;800&family=Sora:wght@500;600;700;800&display=swap" rel="stylesheet">
    <style>
      body {
        font-family: 'Manrope', system-ui, -apple-system, sans-serif;
        transition: background-color 0.3s ease, color 0.3s ease;
        background-image:
          radial-gradient(1200px 500px at -10% -20%, rgba(59, 130, 246, 0.12), transparent 45%),
          radial-gradient(1000px 450px at 120% 10%, rgba(99, 102, 241, 0.11), transparent 40%);
      }
      .dark body {
        background-image:
          radial-gradient(1200px 500px at -10% -20%, rgba(59, 130, 246, 0.18), transparent 45%),
          radial-gradient(1000px 450px at 120% 10%, rgba(99, 102, 241, 0.16), transparent 40%);
      }

      @keyframes fade-slide-up {
        from { opacity: 0; transform: translateY(10px); }
        to { opacity: 1; transform: translateY(0); }
      }
      @keyframes toast-in {
        from { opacity: 0; transform: translateX(24px) scale(0.98); }
        to { opacity: 1; transform: translateX(0) scale(1); }
      }
      @keyframes toast-progress {
        from { transform: scaleX(1); }
        to { transform: scaleX(0); }
      }
      @keyframes soft-float {
        0% { transform: translateY(0); }
        50% { transform: translateY(-6px); }
        100% { transform: translateY(0); }
      }
      .anim-enter { animation: fade-slide-up 0.35s ease both; }
      .anim-toast { animation: toast-in 0.35s ease both; }
      .anim-float { animation: soft-float 5s ease-in-out infinite; }
      
      /* Custom Scrollbar */
      ::-webkit-scrollbar {
        width: 6px;
        height: 6px;
      }
      ::-webkit-scrollbar-track {
        background: transparent; 
      }
      ::-webkit-scrollbar-thumb {
        background: #94a3b8; 
        border-radius: 3px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #64748b; 
      }

      /* Dark mode scrollbar */
      .dark ::-webkit-scrollbar-thumb {
        background: #334155;
      }
      .dark ::-webkit-scrollbar-thumb:hover {
        background: #475569;
      }

      /* Glassmorphism Utilities */
      .glass {
        background: rgba(255, 255, 255, 0.8);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        border: 1px solid rgba(255, 255, 255, 0.3);
      }
      
      .dark .glass {
        background: rgba(15, 23, 42, 0.7); /* Slate 900 with opacity */
        border: 1px solid rgba(255, 255, 255, 0.05);
      }

      /* Global UI language */
      .app-main > * {
        animation: fade-slide-up 0.35s ease both;
      }
      .app-main h1 {
        font-family: 'Sora', 'Manrope', system-ui, sans-serif;
        letter-spacing: -0.02em;
      }
      .app-main input,
      .app-main select,
      .app-main textarea {
        border-radius: 0.75rem;
      }
      .app-main table {
        border-collapse: separate;
        border-spacing: 0;
      }
      .app-main thead th {
        font-size: 11px;
        letter-spacing: 0.07em;
      }
      .app-main code,
      .app-main .font-mono {
        font-family: 'JetBrains Mono', ui-monospace, SFMono-Regular, monospace;
      }
    </style>
  <script type="importmap">
{
  "imports": {
    "react/": "https://esm.sh/react@^19.2.4/",
    "react": "https://esm.sh/react@^19.2.4",
    "recharts": "https://esm.sh/recharts@^3.7.0",
    "react-router-dom": "https://esm.sh/react-router-dom@^7.13.0",
    "zustand": "https://esm.sh/zustand@^5.0.11",
    "zustand/middleware": "https://esm.sh/zustand@^5.0.11/middleware",
    "react-dom/": "https://esm.sh/react-dom@^19.2.4/",
    "lucide-react": "https://esm.sh/lucide-react@^0.563.0",
    "zustand/": "https://esm.sh/zustand@^5.0.11/"
  }
}
</script>
</head>
  <body class="bg-gray-50 dark:bg-slate-950 text-slate-900 dark:text-slate-100">
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
